<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Customer</title>
    <style>
      body {
        font-family: Segoe UI, Arial, sans-serif;
        padding: 20px;
      }
      h1 {
        color: #ee4d2d;
      }
      .form {
        max-width: 420px;
        background: #fff;
        padding: 20px;
        border: 1px solid #eee;
        border-radius: 8px;
      }
      .group {
        margin-bottom: 12px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      .error {
        color: #c0392b;
        font-size: 13px;
        margin-top: 4px;
      }
      .btn {
        padding: 10px 14px;
        background: #ee4d2d;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      a {
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Edit Customer</h1>

    <form
      class="form"
      th:action="@{'/admin/customers/edit/' + ${customer.id}}"
      method="post"
    >
      <div class="group">
        <label>Username</label>
        <input
          type="text"
          th:value="${customer.username}"
          readonly
          style="background-color: #f5f5f5"
        />
      </div>

      <div class="group">
        <label>Password (leave blank to keep)</label>
        <input
          type="password"
          name="password"
          id="password"
          placeholder="Enter new password"
          autocomplete="new-password"
        />
      </div>

      <div class="group">
        <label>Name</label>
        <input
          type="text"
          th:value="${customer.name}"
          readonly
          style="background-color: #f5f5f5"
        />
      </div>

      <div class="group">
        <label>Customer Since</label>
        <input
          type="text"
          th:value="${#calendars.format(customer.customerSince, 'yyyy-MM-dd')}"
          readonly
          style="background-color: #f5f5f5"
        />
      </div>

      <button class="btn" type="submit">Save</button>
      <a th:href="@{/admin/customers}">Back</a>
    </form>
  </body>
</html>
