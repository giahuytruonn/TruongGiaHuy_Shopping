<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Customers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: Segoe UI, Arial, sans-serif;
        padding: 20px;
      }
      h1 {
        color: #ee4d2d;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
      }
      th {
        background: #f5f5f5;
        text-align: left;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .btn {
        padding: 8px 12px;
        background: #ee4d2d;
        color: #fff;
        text-decoration: none;
        border-radius: 6px;
      }
      .alert {
        margin-top: 10px;
        padding: 10px;
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
        border-radius: 6px;
      }
      form {
        display: inline;
      }
      .btn-gray {
        background: #6c757d;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>Customer Management</h1>
      <a class="btn" th:href="@{/admin/customers/add}">Add Customer</a>
    </div>

    <div th:if="${success}" class="alert" th:text="${success}"></div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Name</th>
          <th>Customer Since</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="c : ${customers}">
          <td th:text="${c.id}"></td>
          <td th:text="${c.username}"></td>
          <td th:text="${c.name}"></td>
          <td
            th:text="${#calendars.format(c.customerSince, 'yyyy-MM-dd')}"
          ></td>
          <td>
            <a class="btn" th:href="@{'/admin/customers/edit/' + ${c.id}}"
              >Edit</a
            >
            <form
              th:action="@{'/admin/customers/delete/' + ${c.id}}"
              method="post"
            >
              <button class="btn btn-gray" type="submit">Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
