<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Product | Shopee Style</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #fef6f4;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }

      h1 {
        color: #ee4d2d;
        text-align: center;
        margin-bottom: 25px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .form-container {
        background-color: #fff;
        padding: 35px 40px;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        width: 420px;
        animation: fadeIn 0.6s ease;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #333;
      }

      input[type="text"],
      input[type="number"],
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 15px;
        transition: all 0.2s ease;
        box-sizing: border-box;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #ee4d2d;
        box-shadow: 0 0 6px rgba(238, 77, 45, 0.3);
      }

      .btn {
        padding: 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        transition: all 0.3s ease;
        width: 100%;
      }

      .btn-save {
        background-color: #ee4d2d;
        color: #fff;
        margin-bottom: 10px;
      }

      .btn-save:hover {
        background-color: #d8431f;
        transform: translateY(-1px);
      }

      .btn-cancel {
        background-color: #6c757d;
        color: white;
      }

      .btn-cancel:hover {
        background-color: #5a6268;
        transform: translateY(-1px);
      }

      .alert {
        padding: 12px;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 15px;
        text-align: center;
      }

      .alert-success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .alert-error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <h1>🛠️ Edit Product</h1>

    <div
      th:if="${success}"
      class="alert alert-success"
      th:text="${success}"
    ></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="form-container">
      <form
        th:action="@{'/product/edit/' + ${product.id}}"
        th:object="${product}"
        method="post"
      >
        <div class="form-group">
          <label for="name">Product Name</label>
          <input
            type="text"
            id="name"
            th:field="*{name}"
            placeholder="Enter product name..."
          />
          <div
            class="alert alert-error"
            th:if="${#fields.hasErrors('name')}"
            th:errors="*{name}"
          ></div>
        </div>

        <div class="form-group">
          <label for="price">Price (VND)</label>
          <input
            type="number"
            id="price"
            th:field="*{price}"
            step="0.01"
            min="0"
            placeholder="Enter product price..."
          />
          <div
            class="alert alert-error"
            th:if="${#fields.hasErrors('price')}"
            th:errors="*{price}"
          ></div>
        </div>

        <div class="form-group">
          <label for="inStock">In Stock</label>
          <select id="inStock" th:field="*{inStock}">
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>
        </div>

        <button type="submit" class="btn btn-save">Save Changes</button>
        <a th:href="@{'/product/' + ${product.id}}" class="btn btn-cancel"
          >Cancel</a
        >
      </form>
    </div>
  </body>
</html>
