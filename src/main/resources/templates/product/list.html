<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
<head>
  <meta charset="UTF-8" />
  <title>Danh sách sản phẩm | Shopee Style</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #ff5722;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 22px;
      margin: 0;
    }

    .nav-links a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    .nav-links a:hover {
      text-decoration: underline;
    }

    main {
      max-width: 1000px;
      margin: 30px auto;
      background-color: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
    }

    .btn-add {
      background-color: #ff5722;
      color: white;
    }

    .btn-edit {
      background-color: #ffa726;
      color: white;
    }

    .btn-delete {
      background-color: #e53935;
      color: white;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .alert {
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 4px;
      font-weight: bold;
    }

    .alert-success {
      background-color: #d4edda;
      color: #155724;
    }

    .alert-error {
      background-color: #f8d7da;
      color: #721c24;
    }

    .product-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .product {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 15px;
      background-color: #fff;
      transition: 0.2s;
    }

    .product:hover {
      box-shadow: 0 2px 8px rgba(255, 87, 34, 0.3);
      transform: translateY(-2px);
    }

    .product h2 {
      font-size: 18px;
      color: #ff5722;
      margin-bottom: 8px;
    }

    .product p {
      margin: 5px 0;
      font-size: 14px;
    }

    .actions {
      margin-top: 10px;
    }

    .comments {
      margin-top: 10px;
      background: #fff8e1;
      border-radius: 5px;
      padding: 10px;
    }

    .comment {
      margin-bottom: 8px;
      padding: 5px 10px;
      border-left: 3px solid #ff9800;
      font-style: italic;
      font-size: 13px;
    }

    .no-comment {
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>
<header>
  <h1>Shopee Product Management</h1>
  <div class="nav-links">
    <a th:href="@{/home}">Trang chủ</a>
    <a th:href="@{/login}">Đăng nhập</a>
  </div>
</header>

<main>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <div sec:authorize="hasRole('ADMIN')" style="margin-bottom: 20px">
    <a href="/product/add" class="btn btn-add">+ Thêm sản phẩm mới</a>
  </div>

  <div class="product-list">
    <div th:each="product : ${products}" class="product">
      <a th:href="@{'/product/' + ${product.id}}">
        <h2 th:text="${product.name}">Product Name</h2>
      </a>

      <p><strong>Giá:</strong> <span th:text="${product.price}">0</span> VND</p>
      <p>
        <strong>Tình trạng:</strong>
        <span th:text="${product.inStock ? 'Còn hàng' : 'Hết hàng'}"></span>
      </p>

      <div sec:authorize="hasRole('ADMIN')" class="actions">
        <a th:href="@{'/product/edit/' + ${product.id}}" class="btn btn-edit">Sửa</a>
        <form
                th:action="@{'/product/delete/' + ${product.id}}"
                method="post"
                style="display:inline"
        >
          <button
                  type="submit"
                  class="btn btn-delete"
                  onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này không?')"
          >
            Xóa
          </button>
        </form>
      </div>

      <div class="comments">
        <h4>Bình luận:</h4>
        <div th:if="${#lists.isEmpty(product.comments)}" class="no-comment">
          <em>Chưa có bình luận nào. <a th:href="@{/login}">Đăng nhập</a> để bình luận.</em>
        </div>
        <div th:each="c : ${product.comments}" class="comment">
          <span th:text="${c.text}">Comment Content</span>
        </div>
      </div>
    </div>
  </div>
</main>
</body>
</html>
